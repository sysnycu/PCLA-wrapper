name: Common Runtime

on:
  workflow_dispatch:
    inputs:
      weights_path:
        description: Absolute path to the extracted PCLA pcla_agents directory
        required: true
        default: /opt/pcla-pretrained

jobs:
  common-runtime:
    runs-on: [self-hosted, linux, x64, gpu]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build common slim image
        run: docker build --target common-slim -t pcla-wrapper:common-slim .

      - name: Validate runtime and mounted weights
        run: |
          docker run --rm --gpus all \
            -v "${{ inputs.weights_path }}:/opt/pcla-pretrained:ro" \
            pcla-wrapper:common-slim \
            /app/scripts/validate_common_runtime.py --check-weights

      - name: Load priority agents
        run: |
          for agent in \
            carl_plant_3 \
            plant2_plant2_0 \
            carl_carl_0 \
            carl_roach_0
          do
            docker run --rm --gpus all \
              -v "${{ inputs.weights_path }}:/opt/pcla-pretrained:ro" \
              pcla-wrapper:common-slim \
              /app/scripts/smoke_common_agent.py "${agent}"
          done

      - name: Stage common weights
        run: |
          rm -rf "${RUNNER_TEMP}/pcla-common-weights"
          python3 scripts/prepare_weight_profile.py \
            --profile common \
            --source "${{ inputs.weights_path }}" \
            --output "${RUNNER_TEMP}/pcla-common-weights"

      - name: Build and validate bundled image
        run: |
          docker build \
            -f docker/Dockerfile.bundled \
            --build-arg BASE_IMAGE=pcla-wrapper:common-slim \
            -t pcla-wrapper:common-bundled \
            "${RUNNER_TEMP}/pcla-common-weights"
          docker run --rm --gpus all \
            pcla-wrapper:common-bundled \
            /app/scripts/validate_common_runtime.py --check-weights
